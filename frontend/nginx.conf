server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Tutte le route tornano a index.html (necessario per React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache per gli asset statici
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}