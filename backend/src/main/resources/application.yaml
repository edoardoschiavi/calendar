server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    # Se la variabile d'ambiente non esiste, usa localhost:3307 (utile per i test locali da IDE)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MY_MAIL}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}